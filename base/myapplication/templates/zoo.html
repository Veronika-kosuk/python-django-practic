{%extends 'base.html'%} 
{%block title%} Animals{%endblock%}
{%block my_content%}
<table class= "table table-dark table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Species</th>
            <th>Age</th>
            <th>Health</th>
            <th>Enclosure</th>
        </tr>
    </thead>
    <tbody>
        {% for a in animal %}
        <tr>
            <td>
                <a href="{{a.id}}">{{a.name}}</a>
            </td>
            <td>{{a.species}}</td>
            <td>{{a.age}}</td>
            <td>{{a.health}}</td>
            <td><button type="button" class=" btn btn-primary">Buy</button></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
